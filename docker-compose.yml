version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lottery_postgres
    environment:
      POSTGRES_USER: lottery
      POSTGRES_PASSWORD: lottery_secret
      POSTGRES_DB: lottery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lottery -d lottery_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lottery_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lottery_app
    environment:
      PRETTY: "true"
      DATABASE_URL: postgres://lottery:lottery_secret@postgres:5432/lottery_db?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
